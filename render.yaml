# Render Blueprint
# -----------------
# When you create a "New Blueprint Instance" on Render and point it at this
# repo, Render reads this file and spins up everything below for you.
#
# See https://render.com/docs/blueprint-spec for the full schema.

services:
  - type: web
    name: appointment-scheduler
    runtime: node
    plan: starter            # $7/mo — required for persistent disk
    region: oregon           # change if you prefer a different region
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true         # redeploy automatically on git push

    # Persistent 1 GB disk so the SQLite file survives restarts/redeploys.
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      # Point SQLite at the mounted disk.
      - key: DB_PATH
        value: /var/data/appointments.db

      # Node version (matches our engines requirement).
      - key: NODE_VERSION
        value: "22"

      # Admin password for the /admin page. `sync: false` means Render will
      # prompt you to enter a value in the dashboard on first deploy and
      # keep it private — never stored in this YAML / in git.
      - key: ADMIN_PASSWORD
        sync: false

      # API key for external callers of POST /api/appointments.
      # `generateValue: true` tells Render to auto-generate a strong random
      # string. You'll find the value in the Render dashboard under
      # Environment → copy it and give it to whoever's calling your API.
      - key: API_KEY
        generateValue: true

      # ---- SMTP / booking-notification email ----
      # Defaults match Google Workspace (Gmail). Override any of these in
      # the Render dashboard if you use a different provider.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"

      # The Google Workspace account the server authenticates as
      # (e.g. scheduler@renewedvision.com).
      - key: SMTP_USER
        sync: false

      # App password for SMTP_USER — NOT the account's regular login.
      # Generate one at https://myaccount.google.com/apppasswords
      # (requires 2-Step Verification to be turned on for the account).
      - key: SMTP_PASS
        sync: false

      # From address on the outgoing email. Usually the same as SMTP_USER.
      # Leave blank and the server falls back to SMTP_USER automatically.
      - key: NOTIFY_FROM
        sync: false

      # Where the notification email lands.
      - key: NOTIFY_TO
        value: support@renewedvision.com
