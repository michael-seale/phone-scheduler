# Render Blueprint
# -----------------
# When you create a "New Blueprint Instance" on Render and point it at this
# repo, Render reads this file and spins up everything below for you.
#
# See https://render.com/docs/blueprint-spec for the full schema.

services:
  - type: web
    name: appointment-scheduler
    runtime: node
    plan: starter            # $7/mo — required for persistent disk
    region: oregon           # change if you prefer a different region
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true         # redeploy automatically on git push

    # Persistent 1 GB disk so the SQLite file survives restarts/redeploys.
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      # Point SQLite at the mounted disk.
      - key: DB_PATH
        value: /var/data/appointments.db

      # Node version (matches our engines requirement).
      - key: NODE_VERSION
        value: "22"

      # Run the server in Eastern Time. scheduler-client.js uses
      # Date.getDay()/getHours(), which return the process's local time —
      # so we need the process clock to be ET for the lookups to land in
      # the correct schedule slot. (nowET() in server.js is still explicit
      # about ET and works regardless, so this change is safe.)
      - key: TZ
        value: America/New_York

      # Admin password for the /admin page. `sync: false` means Render will
      # prompt you to enter a value in the dashboard on first deploy and
      # keep it private — never stored in this YAML / in git.
      - key: ADMIN_PASSWORD
        sync: false

      # API key for external callers of POST /api/appointments.
      # `generateValue: true` tells Render to auto-generate a strong random
      # string. You'll find the value in the Render dashboard under
      # Environment → copy it and give it to whoever's calling your API.
      - key: API_KEY
        generateValue: true

      # ---- SMTP / booking-notification email ----
      # Defaults match Google Workspace (Gmail). Override any of these in
      # the Render dashboard if you use a different provider.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"

      # The Google Workspace account the server authenticates as
      # (e.g. scheduler@renewedvision.com).
      - key: SMTP_USER
        sync: false

      # App password for SMTP_USER — NOT the account's regular login.
      # Generate one at https://myaccount.google.com/apppasswords
      # (requires 2-Step Verification to be turned on for the account).
      - key: SMTP_PASS
        sync: false

      # From address on the outgoing email. Usually the same as SMTP_USER.
      # Leave blank and the server falls back to SMTP_USER automatically.
      - key: NOTIFY_FROM
        sync: false

      # Where the notification email lands.
      - key: NOTIFY_TO
        value: support@renewedvision.com

      # Public base URL for this app — used to build absolute cancel /
      # reschedule links in the customer's confirmation email. Set this to
      # whatever your Render service's URL is (or your custom domain once
      # configured). Example: https://appointment-scheduler.onrender.com
      # If left blank, the email omits the cancel/reschedule links and falls
      # back to a "reply to support" note.
      - key: APP_BASE_URL
        sync: false

      # ---- Zendesk (creates a ticket when a booking comes in) ----
      # When all three of SUBDOMAIN / EMAIL / TOKEN are set, bookings create
      # a Zendesk ticket INSTEAD of the support@ notification email above
      # (the customer's confirmation email still goes out normally).
      #
      # ZENDESK_SUBDOMAIN is the subdomain part of your Zendesk URL:
      #   https://<subdomain>.zendesk.com   →   just the <subdomain> here.
      - key: ZENDESK_SUBDOMAIN
        sync: false

      # Zendesk email of the account the API will authenticate as. Must be
      # an agent or admin in that Zendesk instance.
      - key: ZENDESK_EMAIL
        sync: false

      # API token. Generate one at Admin Center → Apps & integrations →
      # APIs → Zendesk API → Add API Token. Give it to Render via this
      # variable — it should never live in git.
      - key: ZENDESK_TOKEN
        sync: false

      # Map from scheduler-rep names (as returned by the RenewedVision
      # scheduler) to Zendesk agent emails, comma-separated. Used to
      # pre-assign each ticket to the on-phones rep.
      # Example:
      #   "Riley Harmon=riley@renewedvision.com,Michael Seale=michael@renewedvision.com"
      # If a name isn't in the map, the ticket is created unassigned.
      - key: ZENDESK_AGENT_MAP
        sync: false

      # Comma-separated list of tags to apply to every booking ticket.
      # Zendesk tags are case-sensitive and can't contain spaces
      # (spaces are auto-converted to underscores).
      # Example:
      #   "phone-appointment,scheduler,propresenter"
      # If unset, defaults to: phone-appointment, scheduler
      - key: ZENDESK_TAGS
        sync: false

      # ---- Zendesk "Product" custom field (optional) ----
      # Fills out a Zendesk dropdown/tagger custom field on each new
      # ticket based on the customer's software_version input.
      #
      # Find the field ID in Zendesk: Admin Center → Objects and rules →
      # Tickets → Fields → click "Product" and copy the numeric id from
      # the URL (https://<sub>.zendesk.com/admin/.../ticket_fields/<ID>).
      - key: ZENDESK_PRODUCT_FIELD_ID
        sync: false

      # Comma-separated mapping from software_version (what the customer
      # typed on the booking page) to the Zendesk dropdown tagger value.
      # Lookup is case-insensitive; unmapped values leave the Product
      # field empty and log a diagnostic on the server.
      # Example:
      #   "ProPresenter 7=propresenter_7,PVP 4=pvp_4,ProPrompter=proprompter"
      - key: ZENDESK_PRODUCT_MAP
        sync: false

      # ---- RenewedVision Scheduler (who's-on-phones lookup) ----
      # The server reads `lib/scheduler-client.js` from the repo at startup
      # and runs it in a sandbox to get the RenewedVisionScheduler global.
      # Leaving binId or apiKey blank disables the lookup (booking still works).
      - key: RV_SCHEDULER_BIN_ID
        sync: false
      - key: RV_SCHEDULER_API_KEY
        sync: false

      # Role ID to look up (e.g. "phone"). If set, takes precedence over
      # RV_SCHEDULER_GROUP. Use this when you want "who is on the Phone role".
      - key: RV_SCHEDULER_ROLE
        sync: false

      # Group name passed to whoIsOn() when RV_SCHEDULER_ROLE is unset.
      # Must match the role's `group` field exactly (case-insensitive).
      - key: RV_SCHEDULER_GROUP
        value: Phone Group

      # Override the path to scheduler-client.js if you put it somewhere
      # other than ./lib/scheduler-client.js. Usually unset.
      # - key: RV_SCHEDULER_CLIENT_PATH
      #   value: /var/data/scheduler-client.js
