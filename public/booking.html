<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Renewed Vision Support</title>

  <!-- Plus Jakarta Sans for the header -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #1a2236;
      --muted: #6b7280;
      --accent: #3b5bdb;
      --accent-weak: #e7ecfd;
      --ok: #1f8a51;
      --err: #c0392b;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 16px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .sub { color: var(--muted); margin: 0 0 6px; }
    .tz { color: var(--ink); font-weight: 600; margin: 0 0 28px; font-size: 14px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    label { display: block; font-weight: 600; margin: 12px 0 6px; font-size: 14px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
    }
    /* Native select arrow */
    select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' d='M1 1.5l5 5 5-5'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }
    textarea { min-height: 80px; resize: vertical; }

    button {
      background: var(--accent);
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { filter: brightness(1.05); }
    button:disabled { background: #a8b0c4; cursor: not-allowed; }

    .slots {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .slot {
      padding: 10px 4px;
      text-align: center;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      user-select: none;
    }
    .slot:hover { border-color: var(--accent); }
    .slot.taken {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
      text-decoration: line-through;
    }
    .slot.selected {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .slot.taken:hover { border-color: var(--border); }

    /* Secondary-style inline button used for "Show next day with availability". */
    .btn-ghost {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .btn-ghost:hover { background: var(--accent-weak); }
    .no-slots {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .msg { margin-top: 14px; padding: 10px 12px; border-radius: 8px; font-size: 14px; }
    .msg.ok { background: #e8f5ef; color: var(--ok); }
    .msg.err { background: #fdecea; color: var(--err); }
    .hint { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .row { grid-template-columns: 1fr; } }

    /* Success screen shown after a booking is created. */
    .success { text-align: center; padding: 28px 20px; }
    .success .check {
      width: 56px; height: 56px; margin: 0 auto 14px;
      border-radius: 50%; background: var(--ok);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 30px; font-weight: 700; line-height: 1;
    }
    .success h2 { margin: 0 0 8px; color: var(--ok); font-size: 22px; }
    .success p  { margin: 0 0 18px; color: var(--muted); }
    .success .btn-back {
      display: inline-block;
      padding: 12px 22px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
    }
    .success .btn-back:hover { filter: brightness(0.95); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Renewed Vision Support</h1>
    <p class="sub">Pick a date and a 30-minute time slot. Slots are Mon–Fri, 9:00 AM – 5:00 PM Eastern Time.</p>
    <p class="tz" id="tzNote">All times shown in Eastern Time.</p>

    <div class="card" id="pickerCard">
      <label for="dateSelect">Date</label>
      <select id="dateSelect" aria-label="Date">
        <option value="" disabled selected>Loading available dates…</option>
      </select>

      <!-- Hidden calendar picker, revealed when the user picks "More dates…" -->
      <div id="moreDateWrap" style="display:none; margin-top:10px;">
        <input type="date" id="dateInput" />
      </div>

      <div class="hint" id="dateHint"></div>

      <div id="slotWrap" style="margin-top: 18px;">
        <label>Available times</label>
        <div class="slots" id="slots"></div>
        <div id="noSlotsMsg"></div>
      </div>
    </div>

    <!-- Shown when the user arrives via the "Reschedule" link in their email. -->
    <div id="rescheduleBanner" class="card" style="display:none; background:#eef1fd; border-color:#c7d0f3;">
      <p style="margin:0; font-weight:600;">Rescheduling your appointment</p>
      <p id="rescheduleBannerSub" style="margin:6px 0 0; color:var(--muted); font-size:14px;"></p>
    </div>

    <!-- Shown after a successful booking; hides the picker + form. -->
    <div id="successCard" class="card success" style="display:none;">
      <div class="check">&#10003;</div>
      <h2 id="successHeadline">Success! Your phone appointment has been scheduled.</h2>
      <p id="successDetails"></p>
      <a href="https://support.renewedvision.com" class="btn-back">Back to Support</a>
    </div>

    <form id="form" class="card" style="display:none;">
      <h3 style="margin-top:0;">Your details</h3>
      <div id="selectedSummary" class="hint"></div>

      <div class="row">
        <div>
          <label for="name">Name *</label>
          <input id="name" name="name" required />
        </div>
        <div>
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" required />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="phone">Phone *</label>
          <input id="phone" name="phone" type="tel" required />
        </div>
        <div>
          <label for="software_version">Software version</label>
          <input id="software_version" name="software_version" placeholder="e.g. ProPresenter 21.3" />
        </div>
      </div>

      <label for="notes">Notes / reason for appointment</label>
      <textarea id="notes" name="notes"></textarea>

      <button type="submit" id="submitBtn">Book appointment</button>
      <div id="msg"></div>
    </form>
  </div>

<script>
  const dateSelect = document.getElementById('dateSelect');
  const dateInput  = document.getElementById('dateInput');
  const moreWrap   = document.getElementById('moreDateWrap');
  const slotsEl    = document.getElementById('slots');
  const noSlotsMsg = document.getElementById('noSlotsMsg');
  const dateHint   = document.getElementById('dateHint');
  const form       = document.getElementById('form');
  const msg        = document.getElementById('msg');
  const summary    = document.getElementById('selectedSummary');

  let selectedSlot = null;
  let currentDate  = null;

  // "MORE" is a sentinel value for the "More dates…" option.
  const MORE = '__more__';

  // Reschedule mode: if the user arrived via ?reschedule=<token> we fetch
  // their existing appointment, prefill the form, and submit through the
  // /api/appointments/reschedule endpoint instead of creating a new row.
  const rescheduleToken = new URLSearchParams(location.search).get('reschedule');
  let rescheduleOriginal = null; // the original appointment, once loaded
  const rescheduleBanner = document.getElementById('rescheduleBanner');
  const rescheduleBannerSub = document.getElementById('rescheduleBannerSub');
  const submitBtn = document.getElementById('submitBtn');

  // Eastern-Time-safe "today as YYYY-MM-DD" for the date input's min.
  const todayET = new Date(
    new Date().toLocaleString('en-US', { timeZone: 'America/New_York' })
  );
  dateInput.min = todayET.toISOString().slice(0, 10);

  // ---- Time zone setup ---------------------------------------------------
  // Appointments are held in Eastern Time, but we display every time in the
  // customer's local zone so they're picking times that feel familiar. For
  // non-ET customers we also show the ET equivalent in parens for clarity.
  let userTz = 'America/New_York';
  try {
    userTz = Intl.DateTimeFormat().resolvedOptions().timeZone || userTz;
  } catch (_) { /* very old browser — stay with ET */ }
  const isUserInET = (userTz === 'America/New_York');

  /** Convert an ET slot (YYYY-MM-DD, HH:MM) to a real Date. DST-aware. */
  function etSlotToDate(dateStr, timeStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    // Pick noon as our "what's the ET offset for this date" anchor.
    const anchor = new Date(Date.UTC(y, m - 1, d, 12, 0));
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York', timeZoneName: 'shortOffset',
    }).formatToParts(anchor);
    const offStr = (parts.find(p => p.type === 'timeZoneName') || {}).value || 'GMT-5';
    const match = offStr.match(/GMT([+-])(\d{1,2})(?::?(\d{2}))?/) || ['-', '-', '5', '00'];
    const sign = match[1];
    const hh = String(match[2]).padStart(2, '0');
    const mm = match[3] || '00';
    return new Date(`${dateStr}T${timeStr}:00${sign}${hh}:${mm}`);
  }

  /** Format a Date as "9:00 AM" in the given TZ (user's TZ by default). */
  function formatLocalTime(date, tz) {
    return new Intl.DateTimeFormat('en-US', {
      hour: 'numeric', minute: '2-digit', hour12: true,
      timeZone: tz || userTz,
    }).format(date);
  }

  /** Short TZ abbreviation ("CDT", "EDT", "BST") for a date in that TZ. */
  function formatTzAbbr(date, tz) {
    try {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: tz || userTz, timeZoneName: 'short',
      }).formatToParts(date);
      return (parts.find(p => p.type === 'timeZoneName') || {}).value || '';
    } catch (_) { return ''; }
  }

  /**
   * Build the display string for a slot: either "9:00 AM EDT" (ET users)
   * or "9:00 AM CDT (10:00 AM ET)" for everyone else, so the customer can
   * always cross-reference with the Eastern-Time anchor.
   */
  function slotDisplay(dateStr, timeStr) {
    const slotDate = etSlotToDate(dateStr, timeStr);
    const local = formatLocalTime(slotDate, userTz);
    const tzAbbr = formatTzAbbr(slotDate, userTz);
    const etLocal = formatLocalTime(slotDate, 'America/New_York');
    if (isUserInET) return `${local} ${tzAbbr}`.trim();
    return `${local} ${tzAbbr} (${etLocal} ET)`;
  }

  // Populate the TZ note: tell the customer what zone we're showing times in.
  (function setTzNote() {
    const tzNote = document.getElementById('tzNote');
    const tzAbbr = formatTzAbbr(new Date(), userTz);
    if (isUserInET) {
      tzNote.textContent = 'All times shown in Eastern Time.';
    } else {
      const abbr = tzAbbr ? ' (' + tzAbbr + ')' : '';
      tzNote.textContent =
        `Times shown in your time zone${abbr}. Appointments are held in Eastern Time.`;
    }
  })();

  /** Human label like "Tomorrow (Tue, Apr 21)" or "Fri, Apr 24". */
  function labelForDate(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const todayStr = `${todayET.getFullYear()}-${String(todayET.getMonth()+1).padStart(2,'0')}-${String(todayET.getDate()).padStart(2,'0')}`;
    const tmr = new Date(todayET); tmr.setDate(todayET.getDate() + 1);
    const tmrStr = `${tmr.getFullYear()}-${String(tmr.getMonth()+1).padStart(2,'0')}-${String(tmr.getDate()).padStart(2,'0')}`;
    const pretty = dt.toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric'
    });
    if (dateStr === todayStr) return `Today (${pretty})`;
    if (dateStr === tmrStr)   return `Tomorrow (${pretty})`;
    return pretty;
  }

  /** Populate the dropdown from /api/next-available-dates. */
  async function loadAvailableDates() {
    try {
      const res = await fetch('/api/next-available-dates?count=5');
      const data = await res.json();
      const dates = data.dates || [];

      dateSelect.innerHTML = '';
      if (dates.length === 0) {
        const opt = document.createElement('option');
        opt.textContent = 'No open dates in the next 60 days';
        opt.disabled = true; opt.selected = true;
        dateSelect.appendChild(opt);
      } else {
        for (const d of dates) {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = labelForDate(d);
          dateSelect.appendChild(opt);
        }
      }
      // Always add the "More dates…" escape hatch.
      const more = document.createElement('option');
      more.value = MORE;
      more.textContent = 'More dates…';
      dateSelect.appendChild(more);

      if (dates.length > 0) {
        dateSelect.value = dates[0];
        setDate(dates[0]);
      }
    } catch (e) {
      dateSelect.innerHTML = '<option disabled selected>Couldn\'t load dates</option>';
    }
  }

  /** Set the active date and load its slots. */
  function setDate(dateStr) {
    currentDate = dateStr;
    loadSlots(dateStr);
  }

  dateSelect.addEventListener('change', () => {
    const val = dateSelect.value;
    if (val === MORE) {
      moreWrap.style.display = '';
      // Default the picker to whatever was last selected, or today.
      dateInput.value = currentDate || dateInput.min;
      setTimeout(() => {
        dateInput.focus();
        if (typeof dateInput.showPicker === 'function') {
          try { dateInput.showPicker(); } catch (_) {}
        }
      }, 0);
    } else {
      moreWrap.style.display = 'none';
      setDate(val);
    }
  });

  dateInput.addEventListener('change', () => {
    if (dateInput.value) setDate(dateInput.value);
  });

  /** Add one day to a YYYY-MM-DD string, returning YYYY-MM-DD. */
  function addDays(dateStr, n) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    dt.setDate(dt.getDate() + n);
    const yy = dt.getFullYear();
    const mm = String(dt.getMonth() + 1).padStart(2, '0');
    const dd = String(dt.getDate()).padStart(2, '0');
    return `${yy}-${mm}-${dd}`;
  }

  /** Fetch slot availability for `date` and render the slot grid. */
  async function loadSlots(date) {
    slotsEl.innerHTML = '<span class="hint">Loading…</span>';
    noSlotsMsg.innerHTML = '';
    form.style.display = 'none';
    selectedSlot = null;
    if (!date) return;
    const res = await fetch('/api/slots?date=' + encodeURIComponent(date));
    const data = await res.json();

    if (!data.slots || data.slots.length === 0) {
      slotsEl.innerHTML = '';
      dateHint.textContent = 'No slots for this day — please pick a weekday.';
      return;
    }
    dateHint.textContent = '';
    slotsEl.innerHTML = '';

    // Hide already-passed slots entirely (relevant for "today").
    const visibleSlots = data.slots.filter(s => s.status !== 'past');
    let availableCount = 0;

    // In reschedule mode we let the user pick their own existing slot
    // (the server treats a "reschedule to the same slot" as a no-op).
    const isOriginalSlotDay =
      rescheduleOriginal && rescheduleOriginal.date === date;

    for (const s of visibleSlots) {
      const btn = document.createElement('div');
      // Server returns status: "available" | "booked" | "blocked" | "past".
      // Past is filtered out above. Booked and blocked render the same.
      let isOpen = s.status === 'available' || (s.available === true && !s.status);
      // Rescheduling: also treat the user's own current booking as clickable.
      if (
        !isOpen &&
        isOriginalSlotDay &&
        s.time === rescheduleOriginal.time &&
        s.status === 'booked'
      ) {
        isOpen = true;
      }
      if (isOpen) availableCount++;
      btn.className = 'slot' + (isOpen ? '' : ' taken');
      // Render the slot in the customer's local time. 12-hour format reads
      // better than 24-hour here, and we strip the "00:" minutes-only suffix.
      const slotDate = etSlotToDate(date, s.time);
      btn.textContent = formatLocalTime(slotDate, userTz);
      btn.dataset.time = s.time;
      // Tooltip carries the ET time for non-ET users, plus the status label
      // (Taken / Unavailable) when the slot isn't clickable.
      const etTip = isUserInET ? '' : `${s.time} Eastern Time`;
      if (s.status === 'blocked') {
        btn.title = etTip ? `Unavailable — ${etTip}` : 'Unavailable';
      } else if (!isOpen) {
        btn.title = etTip ? `Taken — ${etTip}` : 'Taken';
      } else {
        btn.title = etTip;
      }
      if (isOpen) {
        btn.addEventListener('click', () => {
          selectedSlot = s.time;
          document.querySelectorAll('.slot.selected').forEach(x => x.classList.remove('selected'));
          btn.classList.add('selected');
          form.style.display = '';
          summary.textContent =
            `Selected: ${labelForDate(date)} at ${slotDisplay(date, s.time)}`;
          msg.className = '';
          msg.textContent = '';
          // Reschedule mode: prefill fields from the original appointment
          // the first time the form is shown. We don't re-fill on every
          // slot click because the user may have edited the fields.
          if (rescheduleOriginal && !form.dataset.prefilled) {
            document.getElementById('name').value = rescheduleOriginal.name || '';
            document.getElementById('email').value = rescheduleOriginal.email || '';
            document.getElementById('phone').value = rescheduleOriginal.phone || '';
            document.getElementById('software_version').value =
              rescheduleOriginal.software_version || '';
            document.getElementById('notes').value = rescheduleOriginal.notes || '';
            form.dataset.prefilled = '1';
          }
        });
      }
      slotsEl.appendChild(btn);
    }

    // No openings left for this day? Offer to jump to the next open weekday.
    if (availableCount === 0) {
      if (visibleSlots.length === 0) {
        // Everything has already passed (common for late-in-the-day views).
        noSlotsMsg.innerHTML =
          '<p class="no-slots">No more times available today.</p>';
      } else {
        noSlotsMsg.innerHTML =
          '<p class="no-slots">No openings on this day.</p>';
      }
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-ghost';
      btn.textContent = 'Show next day with availability';
      btn.addEventListener('click', () => jumpToNextAvailableDay(date));
      noSlotsMsg.appendChild(btn);
    }
  }

  /** Find and switch to the next weekday after `fromDate` that has openings. */
  async function jumpToNextAvailableDay(fromDate) {
    const start = addDays(fromDate, 1);
    try {
      const res = await fetch(
        '/api/next-available-dates?count=1&from=' + encodeURIComponent(start)
      );
      const data = await res.json();
      const next = (data.dates || [])[0];
      if (!next) {
        noSlotsMsg.innerHTML =
          '<p class="no-slots">No open dates found in the next 60 days.</p>';
        return;
      }
      // Prefer to set the dropdown; if the date isn't in its options, fall
      // back to the calendar picker.
      const hasOption = Array.from(dateSelect.options).some(o => o.value === next);
      if (hasOption) {
        dateSelect.value = next;
        moreWrap.style.display = 'none';
      } else {
        dateSelect.value = MORE;
        moreWrap.style.display = '';
        dateInput.value = next;
      }
      setDate(next);
    } catch (_) {
      noSlotsMsg.innerHTML =
        '<p class="no-slots">Couldn\'t look up the next available day.</p>';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!selectedSlot || !currentDate) return;
    const payload = {
      date: currentDate,
      time: selectedSlot,
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      software_version: document.getElementById('software_version').value,
      notes: document.getElementById('notes').value,
      // Customer's IANA time zone (e.g. "America/Chicago"). Used server-side
      // to render times in their local zone in the confirmation email.
      timezone: userTz,
    };
    submitBtn.disabled = true;
    msg.className = '';
    msg.textContent = '';

    // In reschedule mode we PATCH-via-POST the existing row by token instead
    // of creating a new appointment.
    const isReschedule = !!(rescheduleOriginal && rescheduleToken);
    const url = isReschedule ? '/api/appointments/reschedule' : '/api/appointments';
    if (isReschedule) payload.token = rescheduleToken;

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (res.ok) {
        // Swap the whole page over to the success screen. We hide the date
        // picker and the form card, reset form state, and show the success
        // card with a "Back to Support" button.
        const pickerCard  = document.getElementById('pickerCard');
        const successCard = document.getElementById('successCard');
        const details     = document.getElementById('successDetails');
        const headline    = document.getElementById('successHeadline');
        if (isReschedule) {
          headline.textContent = 'Success! Your phone appointment has been rescheduled.';
        }
        details.textContent =
          `${labelForDate(data.date)} at ${slotDisplay(data.date, data.time)} — check your email for a confirmation.`;
        form.reset();
        form.style.display = 'none';
        pickerCard.style.display = 'none';
        rescheduleBanner.style.display = 'none';
        successCard.style.display = '';
        // Scroll the success card into view on short/mobile screens.
        successCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        msg.className = 'msg err';
        msg.textContent = data.error || 'Booking failed.';
        loadSlots(currentDate);
      }
    } catch (err) {
      msg.className = 'msg err';
      msg.textContent = 'Network error. Please try again.';
    } finally {
      submitBtn.disabled = false;
    }
  });

  /**
   * Entry point for reschedule mode. Fetches the original appointment by
   * token, shows the banner, updates the submit-button label, and then
   * falls through to the normal date-loading flow. Any failure (invalid
   * token, already canceled, network error) falls back silently to the
   * normal new-booking flow.
   */
  async function initReschedule() {
    if (!rescheduleToken) return;
    try {
      const res = await fetch(
        '/api/appointment-by-token?token=' + encodeURIComponent(rescheduleToken)
      );
      if (!res.ok) return;
      rescheduleOriginal = await res.json();
      // Pretty-label the original date for the banner without relying on
      // labelForDate (which does "Today"/"Tomorrow" math we don't need here).
      const [y, m, d] = rescheduleOriginal.date.split('-').map(Number);
      const pretty = new Date(y, m - 1, d).toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric'
      });
      rescheduleBannerSub.textContent =
        `Currently booked for ${pretty} at ` +
        `${slotDisplay(rescheduleOriginal.date, rescheduleOriginal.time)} — ` +
        `pick a new time below and we'll move it.`;
      rescheduleBanner.style.display = '';
      submitBtn.textContent = 'Reschedule appointment';
    } catch (_) {
      // Silent fallback to normal flow.
    }
  }

  // Kick things off. initReschedule runs before the date picker so the
  // banner is in place and rescheduleOriginal is ready when slots load.
  (async function init() {
    await initReschedule();
    loadAvailableDates();
  })();
</script>
