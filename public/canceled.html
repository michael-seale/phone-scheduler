<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Appointment Canceled — Renewed Vision Support</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#ffffff" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #1a2236;
      --muted: #6b7280;
      --accent: #3b5bdb;
      --ok: #1f8a51;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 16px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 800;
      letter-spacing: -0.01em;
      text-align: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
      text-align: center;
    }
    .check {
      width: 56px; height: 56px; margin: 0 auto 14px;
      border-radius: 50%; background: var(--ok);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 30px; font-weight: 700; line-height: 1;
    }
    .headline { margin: 0 0 8px; color: var(--ok); font-size: 22px; font-weight: 700; }
    .sub      { margin: 0 0 22px; color: var(--muted); }
    .btn-primary {
      display: inline-block;
      padding: 12px 22px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
    }
    .btn-primary:hover { filter: brightness(0.95); }
    .btn-ghost {
      display: inline-block;
      padding: 12px 22px;
      margin-left: 8px;
      background: #fff;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
    }
    .btn-ghost:hover { background: #eef1fd; }
    .already { color: var(--muted); font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Renewed Vision Support</h1>
    <div class="card">
      <div class="check">&#10003;</div>
      <p class="headline">Your appointment has been successfully canceled.</p>
      <p class="sub" id="sub">
        Sorry we missed you — feel free to book a new time whenever works for you.
      </p>
      <a href="/" class="btn-primary">Reschedule</a>
      <a href="https://support.renewedvision.com" class="btn-ghost">Back to Support</a>
      <p class="already" id="already" style="display:none;">
        (This appointment was already canceled or has expired.)
      </p>
    </div>
  </div>

  <script>
    // If the server redirected with ?status=already, show a small footnote
    // so the user isn't confused when the link is clicked twice.
    const params = new URLSearchParams(location.search);
    if (params.get('status') === 'already') {
      document.getElementById('already').style.display = '';
    }
  </script>
</body>
</html>
