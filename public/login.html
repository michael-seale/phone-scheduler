<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scheduler — Sign in</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    form {
      background: #fff;
      padding: 28px 32px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      min-width: 320px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { color: #6b7280; margin: 0 0 16px; font-size: 14px; }
    label { display: block; font-weight: 600; font-size: 13px; margin: 12px 0 6px; }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      font-size: 15px;
    }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 0;
      background: #3b5bdb;
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }
    .muted { color: #6b7280; font-size: 12px; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <form method="post" action="/login">
    <h1>Scheduler</h1>
    <p>Sign in to view appointments.</p>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" />
    <button type="submit">Sign in</button>
    <div class="muted">Admins can manage users from the admin page.</div>
  </form>
</body>
</html>
