<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scheduler — Admin</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #1a2236;
      --muted: #6b7280;
      --accent: #3b5bdb;
      --accent-weak: #e7ecfd;
      --border: #e5e7eb;
      --err: #c0392b;
      --warn: #b26a00;
      --ok: #1f8a51;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 30px 20px 60px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }
    h1 { margin: 0; font-size: 24px; }
    .muted { color: var(--muted); font-size: 13px; }

    input[type="date"], button, select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
    }
    button { cursor: pointer; }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
    button.primary:hover { filter: brightness(1.05); }
    button.danger { background: #fff; color: var(--err); border-color: #f3c6c1; }
    button.danger:hover { background: #fdecea; }
    button.ghost { background: #fff; color: var(--ink); }
    button.ghost:hover { background: #f3f4f6; }
    button:disabled { opacity: .55; cursor: not-allowed; }

    /* Collapsible panels */
    details.panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    details.panel > summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    details.panel > summary::-webkit-details-marker { display: none; }
    details.panel > summary .title { font-size: 17px; font-weight: 600; }
    details.panel > summary .chev {
      display: inline-block;
      width: 10px; height: 10px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(-45deg);
      transition: transform .15s ease;
      margin-right: 4px;
    }
    details.panel[open] > summary .chev { transform: rotate(45deg); }
    details.panel .panel-body {
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }
    details.panel .panel-body > :first-child { margin-top: 16px; }

    /* Controls row */
    .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .row.controls label.muted { margin-right: -4px; }

    /* Date chips */
    .chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 10px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-weak);
      color: var(--accent);
      border-radius: 999px;
      padding: 4px 10px 4px 12px;
      font-size: 13px;
      font-weight: 600;
    }
    .chip button {
      background: none; border: 0; padding: 0 0 0 2px;
      color: var(--accent);
      font-size: 15px; line-height: 1;
      cursor: pointer;
    }

    /* Appointments table */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); background: #fafbfd; }
    tr:hover td { background: #fafbfd; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .pill.web { background: var(--accent-weak); color: var(--accent); }
    .pill.api { background: #fff3e0; color: var(--warn); }
    .notes { max-width: 280px; white-space: pre-wrap; }
    .empty { padding: 28px; text-align: center; color: var(--muted); }

    /* Slot grid (availability tab) */
    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 4px 0 12px; font-size: 13px; color: var(--muted); }
    .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }
    .dot.available { background: #fff; border: 1px solid var(--border); }
    .dot.booked    { background: var(--accent-weak); border: 1px solid #c1cdf6; }
    .dot.blocked   { background: #f3f4f6; border: 1px solid #d1d5db; }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .slot {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      background: #fff;
      cursor: pointer;
      user-select: none;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      transition: border-color .1s, background .1s;
    }
    .slot .sub {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .slot.available:hover { border-color: var(--accent); }
    .slot.booked {
      background: var(--accent-weak);
      border-color: #c1cdf6;
      cursor: default;
    }
    .slot.booked .sub { color: var(--accent); }
    .slot.blocked {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #6b7280;
      text-decoration: line-through;
    }
    .slot.blocked .sub { text-decoration: none; color: var(--warn); }
    .slot.blocked:hover { border-color: var(--warn); }

    .toast {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .toast.ok  { background: #e8f5ef; color: var(--ok); }
    .toast.err { background: #fdecea; color: var(--err); }

    form.logout { display: inline; margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Scheduler</h1>
      <form class="logout" method="post" action="/logout">
        <button type="submit" class="ghost">Log out</button>
      </form>
    </header>

    <!-- ======================= APPOINTMENTS ======================= -->
    <details class="panel" id="apptPanel" open>
      <summary>
        <span class="title"><span class="chev"></span>Appointments</span>
        <span class="muted" id="apptCount"></span>
      </summary>
      <div class="panel-body">
        <div class="row controls">
          <label class="muted" for="addDate">Add date</label>
          <input type="date" id="addDate" />
          <button id="addDateBtn" class="primary">Add</button>
          <button id="showAllBtn" class="ghost">Show all upcoming</button>
          <button id="refreshApptBtn" class="ghost">Refresh</button>
        </div>
        <div class="chips" id="dateChips"></div>
        <div id="apptTable" style="margin-top: 14px;">
          <div class="empty">Loading…</div>
        </div>
      </div>
    </details>

    <!-- ======================== AVAILABILITY ====================== -->
    <details class="panel" id="availPanel">
      <summary>
        <span class="title"><span class="chev"></span>Availability</span>
        <span class="muted">Block off individual slots</span>
      </summary>
      <div class="panel-body">
        <div class="row controls">
          <label class="muted" for="availDate">Date</label>
          <input type="date" id="availDate" />
          <button id="availRefresh" class="ghost">Refresh</button>
        </div>
        <div class="legend">
          <span><span class="dot available"></span>Available (click to block)</span>
          <span><span class="dot booked"></span>Booked</span>
          <span><span class="dot blocked"></span>Blocked (click to unblock)</span>
        </div>
        <div id="slotGrid" class="slot-grid"></div>
        <div id="availMsg"></div>
      </div>
    </details>
  </div>

<script>
  /* ---------- shared helpers ---------- */
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));

  function todayISO() {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, options);
    if (res.status === 401) {
      window.location.href = '/login';
      throw new Error('unauthorized');
    }
    return res;
  }

  /* ====================== APPOINTMENTS TAB ===================== */
  const addDate = document.getElementById('addDate');
  const addDateBtn = document.getElementById('addDateBtn');
  const showAllBtn = document.getElementById('showAllBtn');
  const refreshApptBtn = document.getElementById('refreshApptBtn');
  const dateChips = document.getElementById('dateChips');
  const apptTable = document.getElementById('apptTable');
  const apptCount = document.getElementById('apptCount');

  // Selected dates (a Set of YYYY-MM-DD). Empty = "show all upcoming".
  const selectedDates = new Set();
  addDate.value = todayISO();

  addDateBtn.addEventListener('click', () => {
    if (!addDate.value) return;
    selectedDates.add(addDate.value);
    renderChips();
    loadAppointments();
  });
  showAllBtn.addEventListener('click', () => {
    selectedDates.clear();
    renderChips();
    loadAppointments();
  });
  refreshApptBtn.addEventListener('click', loadAppointments);

  function renderChips() {
    const dates = [...selectedDates].sort();
    if (dates.length === 0) {
      dateChips.innerHTML = '<span class="muted">Showing all upcoming appointments.</span>';
      return;
    }
    dateChips.innerHTML = dates.map(d =>
      `<span class="chip">${esc(d)} <button data-remove="${esc(d)}" title="Remove">×</button></span>`
    ).join('');
    dateChips.querySelectorAll('[data-remove]').forEach(b => {
      b.addEventListener('click', () => {
        selectedDates.delete(b.dataset.remove);
        renderChips();
        loadAppointments();
      });
    });
  }

  async function loadAppointments() {
    apptTable.innerHTML = '<div class="empty">Loading…</div>';
    let rows = [];
    try {
      if (selectedDates.size === 0) {
        // Show all upcoming (today forward).
        const today = todayISO();
        const far  = '2099-12-31';
        const res = await apiFetch(`/api/appointments?from=${today}&to=${far}`);
        rows = (await res.json()).appointments || [];
      } else {
        // Query each date individually (simple, keeps server API unchanged).
        const dates = [...selectedDates];
        const results = await Promise.all(dates.map(async (d) => {
          const r = await apiFetch(`/api/appointments?from=${d}&to=${d}`);
          return (await r.json()).appointments || [];
        }));
        // De-dupe by id (shouldn't really happen, but just in case).
        const seen = new Set();
        rows = results.flat().filter((a) => {
          if (seen.has(a.id)) return false;
          seen.add(a.id);
          return true;
        });
        rows.sort((a, b) =>
          a.date === b.date ? a.time.localeCompare(b.time) : a.date.localeCompare(b.date)
        );
      }
    } catch (e) {
      apptTable.innerHTML = '<div class="empty">Couldn\'t load appointments.</div>';
      return;
    }
    renderAppointments(rows);
  }

  function renderAppointments(rows) {
    apptCount.textContent = rows.length
      ? `${rows.length} appointment${rows.length === 1 ? '' : 's'}`
      : '';
    if (rows.length === 0) {
      apptTable.innerHTML = '<div class="empty">No appointments for the selected dates.</div>';
      return;
    }
    apptTable.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Time</th><th>Name</th><th>Email</th>
            <th>Phone</th><th>Version</th><th>Notes</th><th>Source</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr data-id="${r.id}">
              <td>${esc(r.date)}</td>
              <td><strong>${esc(r.time)}</strong></td>
              <td>${esc(r.name)}</td>
              <td><a href="mailto:${esc(r.email)}">${esc(r.email)}</a></td>
              <td>${esc(r.phone)}</td>
              <td>${esc(r.software_version)}</td>
              <td class="notes">${esc(r.notes)}</td>
              <td><span class="pill ${r.source === 'api' ? 'api' : 'web'}">${esc(r.source)}</span></td>
              <td><button class="danger" data-cancel="${r.id}">Cancel</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    apptTable.querySelectorAll('[data-cancel]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!confirm('Cancel this appointment?')) return;
        const id = btn.getAttribute('data-cancel');
        const res = await apiFetch('/api/appointments/' + id, { method: 'DELETE' });
        if (res.ok) {
          loadAppointments();
          // If availability panel is open and showing this date, refresh it.
          if (document.getElementById('availPanel').open) loadSlotGrid();
        } else {
          alert('Failed to cancel');
        }
      });
    });
  }

  /* ===================== AVAILABILITY TAB ====================== */
  const availDate    = document.getElementById('availDate');
  const availRefresh = document.getElementById('availRefresh');
  const slotGrid     = document.getElementById('slotGrid');
  const availMsg     = document.getElementById('availMsg');
  const availPanel   = document.getElementById('availPanel');

  availDate.value = todayISO();
  availRefresh.addEventListener('click', loadSlotGrid);
  availDate.addEventListener('change', loadSlotGrid);
  // Lazy-load when the panel is first opened.
  availPanel.addEventListener('toggle', () => {
    if (availPanel.open) loadSlotGrid();
  });

  // We need two things: the slot status (from /api/slots) AND the block IDs
  // (from /api/blocks) so we can delete by id when unblocking.
  async function loadSlotGrid() {
    const date = availDate.value;
    if (!date) return;
    slotGrid.innerHTML = '<div class="empty" style="grid-column: 1/-1;">Loading…</div>';
    clearMsg();

    let slots = [];
    let blocks = [];
    let appointmentsByTime = {};
    try {
      const [slotsRes, blocksRes, apptRes] = await Promise.all([
        apiFetch('/api/slots?date=' + encodeURIComponent(date)),
        apiFetch('/api/blocks?date=' + encodeURIComponent(date)),
        apiFetch('/api/appointments?from=' + date + '&to=' + date),
      ]);
      slots  = (await slotsRes.json()).slots || [];
      blocks = (await blocksRes.json()).blocks || [];
      const appts = (await apptRes.json()).appointments || [];
      appointmentsByTime = Object.fromEntries(appts.map(a => [a.time, a]));
    } catch (e) {
      slotGrid.innerHTML = '<div class="empty" style="grid-column: 1/-1;">Couldn\'t load slot data.</div>';
      return;
    }

    if (slots.length === 0) {
      slotGrid.innerHTML = '<div class="empty" style="grid-column: 1/-1;">No slots — please pick a weekday.</div>';
      return;
    }

    const blockByTime = Object.fromEntries(blocks.map(b => [b.time, b]));
    slotGrid.innerHTML = slots.map(s => {
      const appt = appointmentsByTime[s.time];
      let sub = 'Available';
      if (s.status === 'booked' && appt) sub = esc(appt.name);
      else if (s.status === 'blocked') sub = 'Blocked';
      return `
        <div class="slot ${s.status}" data-time="${esc(s.time)}" data-status="${esc(s.status)}"
             data-block-id="${blockByTime[s.time] ? blockByTime[s.time].id : ''}">
          ${esc(s.time)}
          <span class="sub">${sub}</span>
        </div>
      `;
    }).join('');

    slotGrid.querySelectorAll('.slot').forEach((el) => {
      el.addEventListener('click', () => handleSlotClick(el, date));
    });
  }

  async function handleSlotClick(el, date) {
    const status = el.dataset.status;
    const time   = el.dataset.time;
    if (status === 'booked') {
      showMsg(`${time} is booked — cancel the appointment to free it up.`, 'err');
      return;
    }
    if (status === 'available') {
      await blockSlot(date, time);
    } else if (status === 'blocked') {
      await unblockSlot(date, time);
    }
    await loadSlotGrid();
  }

  async function blockSlot(date, time) {
    const res = await apiFetch('/api/blocks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, times: [time] }),
    });
    if (res.ok) showMsg(`Blocked ${time}.`, 'ok');
    else showMsg(`Couldn't block ${time}.`, 'err');
  }

  async function unblockSlot(date, time) {
    const url = `/api/blocks?date=${encodeURIComponent(date)}&time=${encodeURIComponent(time)}`;
    const res = await apiFetch(url, { method: 'DELETE' });
    if (res.ok) showMsg(`Unblocked ${time}.`, 'ok');
    else showMsg(`Couldn't unblock ${time}.`, 'err');
  }

  function showMsg(text, kind) {
    availMsg.className = 'toast ' + (kind === 'err' ? 'err' : 'ok');
    availMsg.textContent = text;
    clearTimeout(showMsg._t);
    showMsg._t = setTimeout(clearMsg, 3500);
  }
  function clearMsg() {
    availMsg.className = '';
    availMsg.textContent = '';
  }

  /* ---------- initial load ---------- */
  renderChips();
  loadAppointments();
</script>
</body>
</html>
