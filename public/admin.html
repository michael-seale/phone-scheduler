<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scheduler — Admin</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #1a2236;
      --muted: #6b7280;
      --accent: #3b5bdb;
      --border: #e5e7eb;
      --err: #c0392b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 30px 20px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }
    h1 { margin: 0; font-size: 24px; }
    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    input[type="date"], button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
    }
    button { cursor: pointer; }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
    button.danger { background: #fff; color: var(--err); border-color: #f3c6c1; }
    button.danger:hover { background: #fdecea; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); background: #fafbfd; }
    tr:hover td { background: #fafbfd; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .pill.web { background: #e7ecfd; color: #3b5bdb; }
    .pill.api { background: #fff3e0; color: #b26a00; }
    .muted { color: var(--muted); font-size: 12px; }
    .empty { padding: 40px; text-align: center; color: var(--muted); }
    form.logout { display: inline; }
    a { color: var(--accent); }
    .notes { max-width: 280px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Scheduler</h1>
      <div class="controls">
        <label class="muted" for="from">From</label>
        <input type="date" id="from" />
        <label class="muted" for="to">To</label>
        <input type="date" id="to" />
        <button id="refresh" class="primary">Refresh</button>
        <button id="clearRange">All</button>
        <form class="logout" method="post" action="/logout">
          <button type="submit">Log out</button>
        </form>
      </div>
    </header>

    <div class="card" id="tableCard">
      <div id="content" class="empty">Loading…</div>
    </div>
  </div>

<script>
  const fromEl = document.getElementById('from');
  const toEl = document.getElementById('to');
  const content = document.getElementById('content');

  // Default: today through 30 days out
  const today = new Date();
  const in30 = new Date(); in30.setDate(today.getDate() + 30);
  fromEl.value = today.toISOString().slice(0, 10);
  toEl.value = in30.toISOString().slice(0, 10);

  async function load() {
    content.className = 'empty';
    content.textContent = 'Loading…';
    const qs = (fromEl.value && toEl.value)
      ? `?from=${fromEl.value}&to=${toEl.value}`
      : '';
    const res = await fetch('/api/appointments' + qs);
    if (res.status === 401) {
      window.location.href = '/login';
      return;
    }
    const data = await res.json();
    render(data.appointments || []);
  }

  function render(rows) {
    if (rows.length === 0) {
      content.className = 'empty';
      content.textContent = 'No appointments in this range.';
      return;
    }
    content.className = '';
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
    const html = `
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Time</th><th>Name</th><th>Email</th>
            <th>Phone</th><th>Version</th><th>Notes</th><th>Source</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr data-id="${r.id}">
              <td>${esc(r.date)}</td>
              <td><strong>${esc(r.time)}</strong></td>
              <td>${esc(r.name)}</td>
              <td><a href="mailto:${esc(r.email)}">${esc(r.email)}</a></td>
              <td>${esc(r.phone)}</td>
              <td>${esc(r.software_version)}</td>
              <td class="notes">${esc(r.notes)}</td>
              <td><span class="pill ${r.source === 'api' ? 'api' : 'web'}">${esc(r.source)}</span></td>
              <td><button class="danger" data-cancel="${r.id}">Cancel</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    content.innerHTML = html;
    content.querySelectorAll('[data-cancel]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-cancel');
        if (!confirm('Cancel this appointment?')) return;
        const res = await fetch('/api/appointments/' + id, { method: 'DELETE' });
        if (res.ok) load();
        else alert('Failed to cancel');
      });
    });
  }

  document.getElementById('refresh').addEventListener('click', load);
  document.getElementById('clearRange').addEventListener('click', () => {
    fromEl.value = '';
    toEl.value = '';
    load();
  });
  load();
</script>
</body>
</html>
